ai_usage_summary: |
  AI assistants were used for coding, refactoring, architectural discussion,
  and building the evaluation harness. The engineering decisions — the
  signal-focused embedding text, the skill/title coherence checks, the
  independent gold-label set, and all weight tuning — were human-driven and
  validated against held-out labels. No candidate data is sent to any hosted
  LLM API during the ranking step (it runs network-off, CPU-only).

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  A 5-stage hybrid pipeline. Stage 1 hard-filters obvious non-fits (experience
  band, non-tech-only careers). Stage 2 removes honeypots via timeline/skill
  impossibility checks before they can pollute rankings. Stage 3 scores each
  candidate across six dimensions — semantic similarity (BGE-base embeddings
  over the coherent profile fields), career fit, skills match with a
  credibility cross-check, experience fit, location/logistics, and education.
  Stage 4 applies a behavioral multiplier (0.6–1.3x) from Redrob engagement
  signals so perfect-on-paper-but-inactive candidates are down-weighted, as the
  JD instructs. Stage 5 blends a cross-encoder re-rank over the top candidates
  and generates fact-grounded reasoning. We tuned against an independent,
  hand-labeled gold set (not the scoring heuristics) to get a real NDCG signal,
  and guard the JD's traps (keyword-stuffers, plain-language fits, honeypots)
  with regression tests. The ranking step runs network-off, CPU-only, in under
  5 minutes.

