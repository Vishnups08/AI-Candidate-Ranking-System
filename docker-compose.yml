version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5050:7860"
    environment:
      - PORT=7860
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    volumes:
      - .:/app
      # Exclude node_modules and Next.js build files from backend mount
      - /app/frontend/node_modules
      - /app/frontend/.next

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_HOST=http://localhost:5050
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  frontend_node_modules:
